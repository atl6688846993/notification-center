mute:
  name: Mute notification
  description: Mute an active notification for an elapsed duration or until a future local midnight.
  fields:
    notification_id:
      required: true
      selector:
        text:
    duration:
      required: false
      selector:
        number:
          min: 0
          mode: box
    unit:
      required: false
      selector:
        select:
          options:
            - minutes
            - hours
            - days
            - days_from_now
unmute:
  name: Unmute notification
  description: Remove a notification mute.
  fields:
    notification_id:
      required: true
      selector:
        text:
global_mute:
  name: Mute all notifications
  description: Suppress active notifications for an elapsed duration or until a future local midnight.
  fields:
    duration:
      required: false
      selector:
        number:
          min: 0
          mode: box
    unit:
      required: false
      selector:
        select:
          options:
            - minutes
            - hours
            - days
            - days_from_now
test:
  name: Test notification delivery
  description: Send a configured notification outcome to its selected mobile devices without changing notification state.
  fields:
    notification_id:
      required: true
      selector:
        text:
    outcome:
      required: false
      description: Use the configured outcome key, or leave blank to evaluate the current template result.
      selector:
        text:
